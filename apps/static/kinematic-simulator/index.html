<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kinematic Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="setup();">

  <canvas id="game"></canvas>

  <!-- ═══ Top Bar ═══════════════════════════════════════ -->
  <header id="topbar">
    <div class="tb-left">
      <!-- Hamburger (visible on mobile, or always as sidebar toggle) -->
      <button class="icon-btn" id="btn-menu" aria-label="Toggle toolbar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="brand">
        <svg class="brand-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4M1 12h4m14 0h4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83"/></svg>
        <span class="brand-text hide-mobile">Kinematic<b>Studio</b></span>
      </div>
      <div class="tb-sep hide-mobile"></div>
      <button class="icon-btn hide-mobile" id="btn-save" data-tip="Save · Ctrl+S">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </button>
      <button class="icon-btn hide-mobile" id="btn-load" data-tip="Open · Ctrl+O">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      </button>
    </div>

    <div class="tb-center">
      <button class="sim-toggle" id="btn-sim" data-tip="Play / Pause · Space">
        <svg id="icon-play" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="7,4 20,12 7,20"/></svg>
        <svg id="icon-pause" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>
      </button>
    </div>

    <div class="tb-right">
      <label class="check-row hide-mobile" data-tip="Toggle grid">
        <input type="checkbox" id="chk-grid" checked />
        <span class="check-label">Grid</span>
      </label>
      <div class="tb-sep hide-mobile"></div>
      <button class="icon-btn" id="btn-settings" data-tip="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1.08-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1.08 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001.08 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1.08z"/></svg>
      </button>
    </div>
  </header>

  <!-- ═══ Sidebar Overlay backdrop (mobile) ═════════════ -->
  <div id="sidebar-backdrop" class="backdrop hidden"></div>

  <!-- ═══ Left Panel / Sidebar ══════════════════════════ -->
  <aside id="sidebar">
    <nav class="panel-scroll">

      <!-- Mobile-only: Save/Load/Grid -->
      <section class="panel-section show-mobile-only">
        <div class="sec-label">File</div>
        <button class="tool-btn" id="btn-save-m">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span class="btn-label">Save</span>
        </button>
        <button class="tool-btn" id="btn-load-m">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          <span class="btn-label">Open</span>
        </button>
        <div class="prop-row">
          <span class="prop-name">Grid</span>
          <label class="switch"><input type="checkbox" id="chk-grid-m" checked /><span class="switch-track"></span></label>
        </div>
      </section>

      <section class="panel-section">
        <div class="sec-label">Tools</div>
        <button class="tool-btn" data-tool="joint"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="3" x2="12" y2="7" stroke="currentColor" stroke-width="2"/><line x1="12" y1="17" x2="12" y2="21" stroke="currentColor" stroke-width="2"/><line x1="3" y1="12" x2="7" y2="12" stroke="currentColor" stroke-width="2"/><line x1="17" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2"/></svg><span class="btn-label">Joint</span><kbd class="hide-mobile">J</kbd></button>
        <button class="tool-btn" data-tool="gear"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M4.22 4.22l2.12 2.12m11.32 11.32l2.12 2.12M2 12h3m14 0h3M4.22 19.78l2.12-2.12m11.32-11.32l2.12-2.12"/></svg><span class="btn-label">Gear</span><kbd class="hide-mobile">G</kbd></button>
        <button class="tool-btn" data-tool="link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg><span class="btn-label">Link</span><kbd class="hide-mobile">L</kbd></button>
        <button class="tool-btn" data-tool="path"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="12" x2="20" y2="12" stroke-dasharray="2 3"/><circle cx="4" cy="12" r="2.5"/><circle cx="20" cy="12" r="2.5"/></svg><span class="btn-label">Path</span><kbd class="hide-mobile">P</kbd></button>
        <button class="tool-btn" data-tool="join"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 12h8"/><circle cx="5" cy="12" r="3"/><circle cx="19" cy="12" r="3"/></svg><span class="btn-label">Join to Path</span></button>
        <button class="tool-btn" data-tool="delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg><span class="btn-label">Delete</span><kbd class="hide-mobile">⌫</kbd></button>
      </section>

      <section class="panel-section" id="joint-panel" style="display:none;">
        <div class="sec-label">Selected Joint</div>
        <div class="prop-row"><span class="prop-name">Fixed</span><label class="switch"><input type="checkbox" id="chk-fixed" /><span class="switch-track"></span></label></div>
        <div class="prop-row"><span class="prop-name">Motor</span><label class="switch"><input type="checkbox" id="chk-rotating" /><span class="switch-track"></span></label></div>
        <div class="prop-row" id="speed-row" style="display:none;"><span class="prop-name">Speed</span><input type="range" id="joint-speed" class="inline-slider" min="1" max="30" value="10" /><span class="prop-value" id="joint-speed-val">0.10</span></div>
      </section>

      <section class="panel-section">
        <div class="sec-label">Examples</div>
        <button class="tool-btn sample-btn" data-sample="4-bars"><span class="btn-label">4-Bar Linkage</span></button>
        <button class="tool-btn sample-btn" data-sample="6-bars"><span class="btn-label">6-Bar Linkage</span></button>
        <button class="tool-btn sample-btn" data-sample="mech1"><span class="btn-label">Gear + Link</span></button>
        <button class="tool-btn sample-btn" data-sample="mech2"><span class="btn-label">Complex Mech</span></button>
      </section>

      <!-- Clear All inside scroll area so it's always reachable -->
      <section class="panel-section clear-section">
        <button class="clear-btn" id="btn-clear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Clear All
        </button>
      </section>
    </nav>
  </aside>

  <!-- ═══ Settings Drawer ═══════════════════════════════ -->
  <div id="settings-drawer" class="drawer hidden">
    <div class="drawer-head"><span>Settings</span><button class="drawer-close" id="btn-settings-close">×</button></div>
    <div class="drawer-body">
      <div class="setting-row"><span class="setting-label">Simulation Speed</span><div class="setting-control"><input type="range" id="sim-speed" class="inline-slider" min="10" max="120" value="60" /><span class="setting-val" id="sim-speed-val">60 fps</span></div></div>
      <div class="setting-row"><span class="setting-label">Default Motor Speed</span><div class="setting-control"><input type="range" id="default-motor-speed" class="inline-slider" min="1" max="50" value="10" /><span class="setting-val" id="default-motor-val">0.10</span></div></div>
      <div class="setting-row"><span class="setting-label">Joint Size</span><div class="setting-control"><input type="range" id="joint-size" class="inline-slider" min="5" max="40" value="20" /><span class="setting-val" id="joint-size-val">20</span></div></div>
      <div class="setting-row"><span class="setting-label">Canvas Color</span><div class="setting-control"><input type="color" id="canvas-color" value="#f4f5f7" class="color-swatch" /></div></div>
    </div>
  </div>

  <!-- ═══ Bottom Bar ════════════════════════════════════ -->
  <footer id="bottombar">
    <div class="bb-left">
      <span id="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>
    <div class="bb-right">
      <button class="bb-btn" id="btn-reset-view">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span class="hide-mobile">Reset</span>
      </button>
      <div class="zoom-row">
        <button class="zoom-btn" id="btn-zoom-out">−</button>
        <input type="range" id="zoom-slider" class="hide-mobile" min="5" max="100" value="50" />
        <button class="zoom-btn" id="btn-zoom-in">+</button>
        <span class="zoom-pct" id="zoom-pct">100%</span>
      </div>
    </div>
  </footer>

  <div id="tooltip" class="tooltip"></div>

  <script src="vec.js"></script>
  <script src="circle.js"></script>
  <script src="point.js"></script>
  <script src="line.js"></script>
  <script src="path.js"></script>
  <script src="gear.js"></script>
  <script src="GUI.js"></script>
  <script src="link.js"></script>
  <script src="storage.js"></script>
  <script src="mechanism.js"></script>
  <script src="manageGUI.js"></script>
  <script src="button.js"></script>
  <script src="graph.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
